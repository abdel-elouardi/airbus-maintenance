# ════════════════════════════════════════════════
# GitHub Actions — Build Docker
# Se déclenche à chaque push sur main
# ════════════════════════════════════════════════
name: Docker Build

on:
  push:
    branches: [ main ]   # se déclenche à chaque push

jobs:
  build:
    runs-on: ubuntu-latest   # machine virtuelle GitHub

    steps:
      # 1. Télécharge le code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Installe Docker Buildx
      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      # 3. Construit l'image Docker
      - name: Build image
        run: docker build -t airbus-maintenance .

      # 4. Vérifie que l'image fonctionne
      - name: Test image
        run: docker run --rm airbus-maintenance echo "✅ Docker OK"